name: version-bump

# Tag-only emission. The actual version bump happens locally via
# .githooks/pre-push before the PR is even opened — every PR merged to
# main already carries its own bump in the commit history (see the
# pre-push hook's LOCAL-vs-origin/main comparison). This workflow's only
# job is: on push to main, read the (already-bumped) version from
# .claude-plugin/plugin.json, validate it's semver, and if it's new
# (not already tagged), create + push an annotated git tag for it.
#
# Mirrors dev-harness-kit's .github/workflows/version-bump.yml convention:
# no pytest, no dependency install, pure stdlib (python3 + git) — so
# there is no missing-dependency failure mode. (The prior version of
# this workflow tried to bump-and-commit-back from CI and ran pytest
# without installing it first, which failed on every merge to main.)

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read + validate version, emit tag if new
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          VERSION=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          echo "plugin.json version: $VERSION"

          # Validate MAJOR.MINOR.PATCH (integers only).
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::version '$VERSION' is not valid MAJOR.MINOR.PATCH semver"
            exit 1
          fi

          TAG="v${VERSION}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists — nothing to do."
            exit 0
          fi

          git tag -a "$TAG" -m "Release ${TAG}"
          git push origin "$TAG"
          echo "Pushed tag ${TAG}"
