name: version-bump

# 1-skill-creator follow-up: per the official version-management docs
# (https://code.claude.com/docs/en/plugins#version-management), the
# `.claude-plugin/plugin.json` `version` field and the
# `.claude-plugin/marketplace.json` `source.ref` field are version pins
# for marketplace installs. Bumping them is a one-step release action;
# CI does it on every merge to main so we never ship without a bump.
#
# Policy: patch bump (x.y.N) on every merge to main. Manual major/minor
# bumps happen via PR + merge after a maintainer cuts the version locally.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Bump version in plugin.json + codex-plugin/plugin.json + marketplace.json source.ref
        run: |
          set -euo pipefail

          # Read current version from .claude-plugin/plugin.json
          CURRENT=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          echo "Current version: $CURRENT"

          # Bump patch (x.y.N -> x.y.N+1)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_PATCH=$((PATCH + 1))
          NEW="${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "New version: $NEW"

          # Update .claude-plugin/plugin.json
          python3 -c "
          import json, sys
          p = '.claude-plugin/plugin.json'
          data = json.load(open(p))
          data['version'] = '$NEW'
          json.dump(data, open(p, 'w'), indent=2)
          open(p, 'a').write('\n')
          "

          # Update .codex-plugin/plugin.json
          python3 -c "
          import json
          p = '.codex-plugin/plugin.json'
          data = json.load(open(p))
          data['version'] = '$NEW'
          json.dump(data, open(p, 'w'), indent=2)
          open(p, 'a').write('\n')
          "

          # Update marketplace.json source.ref to the new commit SHA
          COMMIT_SHA="${GITHUB_SHA}"
          python3 -c "
          import json
          p = '.claude-plugin/marketplace.json'
          data = json.load(open(p))
          for entry in data['plugins']:
              if entry.get('source', {}).get('source') == 'url':
                  entry['source']['ref'] = '$COMMIT_SHA'
          json.dump(data, open(p, 'w'), indent=2)
          open(p, 'a').write('\n')
          "

          echo "Bumped to $NEW (commit $COMMIT_SHA)"

      - name: Validate manifests
        run: |
          python3 -m pytest tests/test_marketplace_json.py -q

      - name: Commit + push the bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json .codex-plugin/plugin.json .claude-plugin/marketplace.json
          if git diff --cached --quiet; then
            echo "Nothing to commit (version already current)."
            exit 0
          fi
          git commit -m "chore(release): bump version to $(python3 -c 'import json; print(json.load(open(\".claude-plugin/plugin.json\"))[\"version\"])') and pin marketplace to $GITHUB_SHA"
          git push
