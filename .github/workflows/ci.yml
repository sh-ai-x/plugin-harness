name: CI

# Branch-policy: fail-closed on direct push to main. Requires PR review
# before merge. Pair with branch-protection rules for full coverage
# (the in-workflow check fires on direct pushes that bypass the
# PR pipeline entirely, e.g. `git push --no-verify`).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

# A07: scope GITHUB_TOKEN to read-only at the workflow level. Per-job
# `permissions:` blocks (where set) override this for write needs.
# PR #35 security review: previously implicit `permissions: write-all`
# (the GitHub Actions default for workflows without an explicit block).
permissions:
  contents: read

jobs:
  branch-policy:
    name: branch-policy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # The provenance probe (`gh api /commits/{sha}/pulls`) needs to read PRs.
    # This block overrides the workflow-level `contents: read`, so both scopes
    # must be listed: `contents` for checkout, `pull-requests` for the probe.
    permissions:
      contents: read
      pull-requests: read
    steps:
      # A03/A08: SHA-pin CI actions (mutable `@v4` tag re-binds on every
      # upstream re-tag, including a compromised maintainer account).
      # Bump SHA manually via the project's actions-pinning script; record
      # the upgrade in .github/dependencies.md or equivalent.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
      - name: Direct push to main — policy violation recorded
        # gh CLI in Actions does not auto-read the workflow token; without
        # GH_TOKEN, `gh api` aborts to stderr and the probe fail-closes on
        # every push (including legitimate PR merges). Supply it explicitly.
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/branch-policy.sh

  test:
    name: test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Run tests
        run: bash scripts/test.sh

  validate:
    name: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Run validation suite
        run: python3 scripts/validate.py